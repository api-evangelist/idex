aid: idex
name: IDEX Corporation
description: >-
  IDEX Corporation (NYSE: IEX) is a global engineered products company that
  designs and manufactures pumps, flow meters, valves, fluidics systems,
  precision components, and fire and safety equipment. IDEX serves health,
  science, water, energy, semiconductor, aerospace, fire and safety, and
  industrial markets through three segments: Fluid and Metering Technologies,
  Health and Science Technologies, and Fire and Safety / Diversified Products.
